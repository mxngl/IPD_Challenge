<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STV Dashboard</title>
  <style>
    :root {
      --bg: #f4efe7;
      --surface: rgba(255, 252, 247, 0.86);
      --surface-strong: #fffaf3;
      --ink: #1f2a2e;
      --muted: #5f6c69;
      --line: rgba(31, 42, 46, 0.12);
      --accent: #b45d3c;
      --accent-soft: #e7c7ad;
      --sage: #6b8a7a;
      --shadow: 0 18px 48px rgba(45, 39, 31, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(180, 93, 60, 0.16), transparent 28%),
        radial-gradient(circle at top right, rgba(107, 138, 122, 0.18), transparent 24%),
        linear-gradient(180deg, #f7f1e8 0%, #f1ece3 100%);
    }

    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 56px;
    }

    .hero {
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(255, 250, 243, 0.95), rgba(248, 240, 231, 0.9));
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -90px -90px auto;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: rgba(180, 93, 60, 0.08);
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      max-width: 12ch;
      font-size: clamp(2.4rem, 4vw, 4.8rem);
      line-height: 0.96;
      font-weight: 600;
    }

    .hero p {
      max-width: 58ch;
      margin: 16px 0 0;
      font-size: 1.05rem;
      line-height: 1.65;
      color: var(--muted);
    }

    .run-list {
      margin-top: 28px;
      display: grid;
      gap: 24px;
    }

    .run-card {
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--surface);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .run-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: start;
      margin-bottom: 18px;
    }

    .run-title {
      margin: 0;
      font-size: clamp(1.5rem, 2vw, 2rem);
      line-height: 1.05;
    }

    .run-subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: #6d331f;
      font-size: 0.9rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat {
      padding: 14px;
      border-radius: 18px;
      background: var(--surface-strong);
      border: 1px solid var(--line);
    }

    .stat-label {
      display: block;
      color: var(--muted);
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 1.3rem;
      line-height: 1.1;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }

    .history-panel {
      margin: 8px 0 20px;
      padding: 16px;
      border-radius: 18px;
      background: var(--surface-strong);
      border: 1px solid var(--line);
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .history-title {
      margin: 0;
      font-size: 1rem;
    }

    .history-subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .delta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .delta-card {
      padding: 12px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
    }

    .delta-label {
      display: block;
      color: var(--muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .delta-value {
      font-size: 1.1rem;
      line-height: 1.2;
    }

    .delta-positive {
      color: #8a3f21;
    }

    .delta-negative {
      color: #2d6a4f;
    }

    .delta-neutral {
      color: var(--ink);
    }

    .trend-chart {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(244, 239, 231, 0.65), rgba(255, 255, 255, 0.9));
      border: 1px solid var(--line);
    }

    .trend-legend {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .legend-swatch {
      width: 12px;
      height: 12px;
      border-radius: 999px;
    }

    figure {
      margin: 0;
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      background: #fff;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      background: linear-gradient(135deg, #f6efe6, #ece4d8);
    }

    figcaption {
      padding: 12px 14px 14px;
      font-size: 0.96rem;
      color: var(--muted);
      border-top: 1px solid var(--line);
    }

    .footer-note,
    .empty-state {
      margin-top: 24px;
      color: var(--muted);
      line-height: 1.6;
    }

    .empty-state {
      display: none;
      padding: 24px;
      border-radius: 20px;
      border: 1px dashed var(--line);
      background: rgba(255, 250, 243, 0.7);
    }

    @media (max-width: 720px) {
      .shell {
        width: min(100% - 20px, 1180px);
        padding-top: 20px;
      }

      .hero,
      .run-card {
        padding: 18px;
      }

      .run-header {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">Sustainability Tracking Value</p>
      <h1>STV plot dashboard</h1>

    </section>

    <section id="run-list" class="run-list" aria-label="STV runs"></section>
    <section id="empty-state" class="empty-state">
      No STV result folders were found. Generate results into <code>outputs/stv_*/</code> and refresh this page.
    </section>


  </main>

  <script>
    const RUNS = [
      { id: "stv_project", title: "Project STV", subtitle: "Combined project-level result across individual STV runs" },
      { id: "stv_architecture", title: "Architecture STV", subtitle: "Derived from the Revit architecture takeoff" },
      { id: "stv_structural", title: "Structural STV", subtitle: "Derived from the Revit structural schedule" },
      { id: "stv_mep", title: "MEP STV", subtitle: "Derived from the Revit MEP takeoff" },
      { id: "stv_example", title: "Example STV", subtitle: "Reference example generated from bundled inputs" }
    ];

    const IMAGE_CAPTIONS = [
      { file: "target_vs_project.png", caption: "Target vs project impacts" },
      { file: "life_cycle_breakdown.png", caption: "Life-cycle impact breakdown" },
      { file: "target_vs_project_radial.png", caption: "Target vs project percentages" }
    ];

    const runList = document.getElementById("run-list");
    const emptyState = document.getElementById("empty-state");

    const numberFormatter = new Intl.NumberFormat("en-US", { maximumFractionDigits: 0 });
    const percentFormatter = new Intl.NumberFormat("en-US", { maximumFractionDigits: 1 });
    const dateFormatter = new Intl.DateTimeFormat("en-US", {
      year: "numeric",
      month: "short",
      day: "numeric",
      hour: "numeric",
      minute: "2-digit"
    });
    const TREND_SERIES = [
      { key: "carbon", label: "Carbon", color: "#b45d3c" },
      { key: "energy", label: "Energy", color: "#6b8a7a" },
      { key: "water", label: "Water", color: "#5d7ea8" }
    ];

    function formatMetric(metric) {
      if (metric == null) {
        return "N/A";
      }
      return numberFormatter.format(metric);
    }

    function formatPercent(value) {
      if (value == null) {
        return "N/A";
      }
      return percentFormatter.format(value * 100) + "%";
    }

    function metricCard(label, value) {
      return `
        <div class="stat">
          <span class="stat-label">${label}</span>
          <span class="stat-value">${value}</span>
        </div>
      `;
    }

    function formatSignedDelta(value) {
      if (value == null || Number.isNaN(value)) {
        return "N/A";
      }
      if (value === 0) {
        return "0";
      }
      const prefix = value > 0 ? "+" : "";
      return prefix + numberFormatter.format(Math.round(value));
    }

    function formatSignedPercentDelta(value) {
      if (value == null || Number.isNaN(value)) {
        return "N/A";
      }
      if (value === 0) {
        return "0.0 pp";
      }
      const prefix = value > 0 ? "+" : "";
      return prefix + percentFormatter.format(value * 100) + " pp";
    }

    function deltaClass(value) {
      if (value == null || Number.isNaN(value) || value === 0) {
        return "delta-neutral";
      }
      return value > 0 ? "delta-positive" : "delta-negative";
    }

    function buildTrendSvg(history) {
      if (!history || history.length < 2) {
        return `<p class="history-subtitle">Trend chart will appear after at least two recorded runs.</p>`;
      }

      const width = 840;
      const height = 260;
      const padding = { top: 20, right: 20, bottom: 34, left: 42 };
      const innerWidth = width - padding.left - padding.right;
      const innerHeight = height - padding.top - padding.bottom;

      const points = TREND_SERIES.flatMap((series) =>
        history.map((entry) => (entry.metric_summary?.[series.key]?.percent_of_target ?? 0) * 100)
      );
      const maxValue = Math.max(...points, 1);

      const makeX = (index) =>
        padding.left + (history.length === 1 ? innerWidth / 2 : (innerWidth * index) / (history.length - 1));
      const makeY = (value) => padding.top + innerHeight - (value / maxValue) * innerHeight;

      const grid = Array.from({ length: 4 }, (_, idx) => {
        const ratio = idx / 3;
        const y = padding.top + innerHeight * ratio;
        const labelValue = maxValue * (1 - ratio);
        return `
          <line x1="${padding.left}" y1="${y}" x2="${width - padding.right}" y2="${y}" stroke="rgba(31,42,46,0.10)" />
          <text x="${padding.left - 8}" y="${y + 4}" text-anchor="end" font-size="11" fill="#5f6c69">${percentFormatter.format(labelValue)}%</text>
        `;
      }).join("");

      const labels = history.map((entry, index) => {
        const x = makeX(index);
        const text = dateFormatter.format(new Date(entry.timestamp));
        return `<text x="${x}" y="${height - 10}" text-anchor="middle" font-size="11" fill="#5f6c69">${text}</text>`;
      }).join("");

      const seriesMarkup = TREND_SERIES.map((series) => {
        const values = history.map((entry) => (entry.metric_summary?.[series.key]?.percent_of_target ?? 0) * 100);
        const path = values.map((value, index) => `${index === 0 ? "M" : "L"} ${makeX(index)} ${makeY(value)}`).join(" ");
        const dots = values.map((value, index) => `
          <circle cx="${makeX(index)}" cy="${makeY(value)}" r="4" fill="${series.color}" />
        `).join("");
        return `
          <path d="${path}" fill="none" stroke="${series.color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
          ${dots}
        `;
      }).join("");

      return `
        <svg class="trend-chart" viewBox="0 0 ${width} ${height}" role="img" aria-label="STV trend over time">
          ${grid}
          ${seriesMarkup}
          ${labels}
        </svg>
        <div class="trend-legend">
          ${TREND_SERIES.map((series) => `
            <span class="legend-item">
              <span class="legend-swatch" style="background:${series.color}"></span>
              ${series.label}
            </span>
          `).join("")}
        </div>
      `;
    }

    function buildHistoryPanel(history) {
      if (!history || history.length === 0) {
        return "";
      }

      const current = history[history.length - 1];
      const previous = history.length > 1 ? history[history.length - 2] : null;
      const deltas = TREND_SERIES.map((series) => {
        const currentMetric = current.metric_summary?.[series.key] || {};
        const previousMetric = previous?.metric_summary?.[series.key] || {};
        const absoluteDelta =
          previous == null ? null : (currentMetric.project ?? 0) - (previousMetric.project ?? 0);
        const percentDelta =
          previous == null ? null : (currentMetric.percent_of_target ?? 0) - (previousMetric.percent_of_target ?? 0);
        return `
          <div class="delta-card">
            <span class="delta-label">${series.label} delta</span>
            <div class="delta-value ${deltaClass(absoluteDelta)}">${formatSignedDelta(absoluteDelta)}</div>
            <div class="history-subtitle ${deltaClass(percentDelta)}">${formatSignedPercentDelta(percentDelta)}</div>
          </div>
        `;
      }).join("");

      const lastRunText = previous
        ? `Latest run ${dateFormatter.format(new Date(current.timestamp))}. Delta is versus ${dateFormatter.format(new Date(previous.timestamp))}.`
        : `Latest run ${dateFormatter.format(new Date(current.timestamp))}. Run again to see deltas over time.`;

      return `
        <section class="history-panel">
          <div class="history-header">
            <div>
              <h3 class="history-title">Run History</h3>
              <p class="history-subtitle">${lastRunText}</p>
            </div>
          </div>
          <div class="delta-grid">
            ${deltas}
          </div>
          ${buildTrendSvg(history)}
        </section>
      `;
    }

    function buildPlots(run) {
      return IMAGE_CAPTIONS.map((image) => `
        <figure>
          <img
            src="outputs/${run.id}/${image.file}"
            alt="${run.title} - ${image.caption}"
            loading="lazy"
          >
          <figcaption>${image.caption}</figcaption>
        </figure>
      `).join("");
    }

    function buildRunCard(run, results, history) {
      const summary = results.metric_summary || {};
      const carbon = summary.carbon || {};
      const energy = summary.energy || {};
      const water = summary.water || {};
      const lifetime = results.lifetime_years != null ? `${results.lifetime_years} years` : "Lifetime not set";
      const team = results.team || "Unknown team";

      return `
        <article class="run-card">
          <div class="run-header">
            <div>
              <h2 class="run-title">${run.title}</h2>
              <p class="run-subtitle">${run.subtitle} for team ${team}.</p>
            </div>
            <span class="tag">${lifetime}</span>
          </div>
          <div class="stats">
            ${metricCard("Carbon vs target", formatPercent(carbon.percent_of_target))}
            ${metricCard("Energy vs target", formatPercent(energy.percent_of_target))}
            ${metricCard("Water vs target", formatPercent(water.percent_of_target))}
            ${metricCard("Project carbon", formatMetric(carbon.project))}
            ${metricCard("Project energy", formatMetric(energy.project))}
            ${metricCard("Project water", formatMetric(water.project))}
          </div>
          ${buildHistoryPanel(history)}
          <div class="gallery">
            ${buildPlots(run)}
          </div>
        </article>
      `;
    }

    async function loadRun(run) {
      const response = await fetch(`outputs/${run.id}/stv_results.json`, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`Missing results for ${run.id}`);
      }
      return response.json();
    }

    async function loadHistory(run) {
      const response = await fetch(`outputs/${run.id}/history.json`, { cache: "no-store" });
      if (!response.ok) {
        return [];
      }
      return response.json();
    }

    async function render() {
      const cards = [];

      for (const run of RUNS) {
        try {
          const [results, history] = await Promise.all([loadRun(run), loadHistory(run)]);
          cards.push(buildRunCard(run, results, history));
        } catch (error) {
          console.warn(error);
        }
      }

      if (cards.length === 0) {
        emptyState.style.display = "block";
        return;
      }

      runList.innerHTML = cards.join("");
    }

    render();
  </script>
</body>
</html>
